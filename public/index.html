<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Gomoku</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee;
       display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
h1 { margin-bottom: 10px; color: #e94560; }
#controls { margin-bottom: 15px; display: flex; gap: 12px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
select, button { padding: 6px 12px; border-radius: 4px; border: none; font-size: 14px; cursor: pointer; }
button { background: #e94560; color: #fff; }
button:hover { background: #ff6b6b; }
select { background: #16213e; color: #eee; border: 1px solid #444; width: 100%; }
#music-btn { background: #16213e; border: 1px solid #444; font-size: 18px; padding: 6px 10px; }
#music-btn:hover { background: #1a1a4e; }
.player-card { background: #16213e; border: 1px solid #444; border-radius: 6px; padding: 10px 14px; display: flex; flex-direction: column; gap: 7px; min-width: 160px; }
.card-header { font-weight: 600; font-size: 14px; }
.neural-opts { display: flex; flex-direction: column; gap: 5px; font-size: 13px; }
.neural-opts label { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
.neural-opts input[type=range] { width: 75px; accent-color: #e94560; cursor: pointer; }
.neural-opts input[type=number] { width: 55px; background: #0f3460; color: #eee; border: 1px solid #555; border-radius: 3px; padding: 2px 4px; font-size: 13px; }
.swap-col { display: flex; align-items: center; padding-top: 28px; }
.swap-col button { background: #16213e; border: 1px solid #555; font-size: 20px; padding: 6px 10px; }
.swap-col button:hover { background: #1a1a4e; }
.action-col { display: flex; flex-direction: column; gap: 8px; align-items: stretch; padding-top: 28px; }
#status { margin-bottom: 10px; font-size: 16px; min-height: 24px; }
canvas { cursor: crosshair; border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
.thinking { animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
</style>
</head>
<body>
<h1>Gomoku</h1>
<div id="controls">
  <div class="player-card">
    <div class="card-header">⚫ Black</div>
    <select id="black" onchange="onPolicyChange('black')">
      <option value="human">Human</option>
      <option value="smart" selected>Smart AI</option>
      <option value="random">Random AI</option>
    </select>
    <div class="neural-opts" id="neural-opts-black" style="display:none">
      <label>Temp
        <input type="range" id="temp-black" min="0" max="1" step="0.05" value="0.5"
               oninput="document.getElementById('temp-black-val').textContent=parseFloat(this.value).toFixed(2)">
        <span id="temp-black-val">0.50</span>
      </label>
      <label><input type="checkbox" id="mcts-black" onchange="onMctsChange('black')"> MCTS</label>
      <div id="mcts-sims-row-black" style="display:none">
        <label>Sims <input type="number" id="sims-black" value="100" min="10" max="800" step="10"></label>
      </div>
    </div>
  </div>
  <div class="swap-col"><button onclick="swapPlayers()" title="Swap players">⇄</button></div>
  <div class="player-card">
    <div class="card-header">⚪ White</div>
    <select id="white" onchange="onPolicyChange('white')">
      <option value="human">Human</option>
      <option value="smart" selected>Smart AI</option>
      <option value="random">Random AI</option>
    </select>
    <div class="neural-opts" id="neural-opts-white" style="display:none">
      <label>Temp
        <input type="range" id="temp-white" min="0" max="1" step="0.05" value="0.5"
               oninput="document.getElementById('temp-white-val').textContent=parseFloat(this.value).toFixed(2)">
        <span id="temp-white-val">0.50</span>
      </label>
      <label><input type="checkbox" id="mcts-white" onchange="onMctsChange('white')"> MCTS</label>
      <div id="mcts-sims-row-white" style="display:none">
        <label>Sims <input type="number" id="sims-white" value="100" min="10" max="800" step="10"></label>
      </div>
    </div>
  </div>
  <div class="action-col">
    <button onclick="newGame()">New Game</button>
    <button id="music-btn" onclick="toggleMusic()" title="Toggle Music">🔇</button>
  </div>
</div>
<div id="status">Click "New Game" to start</div>
<canvas id="board" width="620" height="620"></canvas>

<script>
// ====================== MUSIC ENGINE ======================
// Procedurally generated calm ambient music using Web Audio API
// Uses pentatonic scale arpeggios with reverb and soft pads

let audioCtx = null;
let musicPlaying = false;
let musicNodes = [];  // track all scheduled sources for cleanup
let musicInterval = null;
let masterGain = null;

// Pentatonic scale frequencies (C4 pentatonic across multiple octaves)
const PENTATONIC_FREQS = [
  // Octave 3
  130.81, 146.83, 164.81, 196.00, 220.00,
  // Octave 4
  261.63, 293.66, 329.63, 392.00, 440.00,
  // Octave 5
  523.25, 587.33, 659.25, 783.99, 880.00,
];

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Master gain
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.35;

  // Convolution reverb approximation using delay feedback
  const convolver = createReverb();
  const reverbGain = audioCtx.createGain();
  reverbGain.gain.value = 0.5;

  const dryGain = audioCtx.createGain();
  dryGain.gain.value = 0.7;

  masterGain.connect(dryGain);
  masterGain.connect(convolver);
  convolver.connect(reverbGain);
  dryGain.connect(audioCtx.destination);
  reverbGain.connect(audioCtx.destination);
}

function createReverb() {
  // Simple algorithmic reverb using multiple delays
  const convolver = audioCtx.createConvolver();
  const sampleRate = audioCtx.sampleRate;
  const length = sampleRate * 3; // 3 second reverb tail
  const impulse = audioCtx.createBuffer(2, length, sampleRate);

  for (let channel = 0; channel < 2; channel++) {
    const data = impulse.getChannelData(channel);
    for (let i = 0; i < length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2.5);
    }
  }
  convolver.buffer = impulse;
  return convolver;
}

function playNote(freq, startTime, duration, type = 'sine', volume = 0.12) {
  if (!audioCtx || !musicPlaying) return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = type;
  osc.frequency.value = freq;

  // Gentle envelope
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(volume, startTime + 0.15);
  gain.gain.setValueAtTime(volume, startTime + duration - 0.4);
  gain.gain.linearRampToValueAtTime(0, startTime + duration);

  osc.connect(gain);
  gain.connect(masterGain);

  osc.start(startTime);
  osc.stop(startTime + duration);

  musicNodes.push(osc);
  osc.onended = () => {
    const idx = musicNodes.indexOf(osc);
    if (idx > -1) musicNodes.splice(idx, 1);
  };
}

function playPad(freq, startTime, duration) {
  if (!audioCtx || !musicPlaying) return;

  // Layered soft pad: sine + triangle at slightly detuned frequencies
  const oscs = [];
  const gain = audioCtx.createGain();

  for (let i = 0; i < 3; i++) {
    const osc = audioCtx.createOscillator();
    osc.type = i < 2 ? 'sine' : 'triangle';
    osc.frequency.value = freq * (1 + (i - 1) * 0.003); // slight detune
    osc.connect(gain);
    oscs.push(osc);
  }

  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(0.06, startTime + 1.0);
  gain.gain.setValueAtTime(0.06, startTime + duration - 1.5);
  gain.gain.linearRampToValueAtTime(0, startTime + duration);
  gain.connect(masterGain);

  oscs.forEach(o => {
    o.start(startTime);
    o.stop(startTime + duration);
    musicNodes.push(o);
    o.onended = () => {
      const idx = musicNodes.indexOf(o);
      if (idx > -1) musicNodes.splice(idx, 1);
    };
  });
}

function scheduleMusicalPhrase() {
  if (!audioCtx || !musicPlaying) return;

  const now = audioCtx.currentTime;

  // Background pad — choose a root from lower pentatonic notes
  const padRoot = PENTATONIC_FREQS[Math.floor(Math.random() * 5)]; // octave 3
  playPad(padRoot, now, 8);
  playPad(padRoot * 1.5, now + 0.1, 7.5); // fifth above

  // Gentle arpeggio melody
  const numNotes = 4 + Math.floor(Math.random() * 4); // 4-7 notes
  const startIdx = 5 + Math.floor(Math.random() * 5); // from octave 4-5 range
  let time = now + 0.5;

  for (let i = 0; i < numNotes; i++) {
    const idx = startIdx + Math.floor(Math.random() * 6);
    const freq = PENTATONIC_FREQS[Math.min(idx, PENTATONIC_FREQS.length - 1)];
    const dur = 1.0 + Math.random() * 1.5;
    playNote(freq, time, dur, Math.random() > 0.5 ? 'sine' : 'triangle', 0.08 + Math.random() * 0.05);
    time += 0.8 + Math.random() * 1.2;
  }
}

function startMusic() {
  initAudio();
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
  musicPlaying = true;
  scheduleMusicalPhrase();
  // Schedule new phrases every ~6 seconds
  musicInterval = setInterval(() => {
    if (musicPlaying) scheduleMusicalPhrase();
  }, 6000);
  document.getElementById('music-btn').textContent = '🔊';
}

function stopMusic() {
  musicPlaying = false;
  if (musicInterval) {
    clearInterval(musicInterval);
    musicInterval = null;
  }
  // Stop all active nodes
  musicNodes.forEach(n => { try { n.stop(); } catch(e) {} });
  musicNodes = [];
  document.getElementById('music-btn').textContent = '🔇';
}

function toggleMusic() {
  if (musicPlaying) {
    stopMusic();
  } else {
    startMusic();
  }
}

// ====================== GAME ENGINE ======================

const SIZE = 15;
const WIN_LENGTH = 5;
const PADDING = 20;
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const cellSize = (canvas.width - 2 * PADDING) / (SIZE - 1);

// --- Game State (fully client-side) ---
let game = null;
let thinking = false;
let aiLoopRunning = false;

const API_BASE = '';

// --- Player config helpers ---
function isHuman(player) {
  const side = player === 1 ? 'black' : 'white';
  return document.getElementById(side).value === 'human';
}

function getPlayerConfig(player) {
  const side = player === 1 ? 'black' : 'white';
  const policy = document.getElementById(side).value;
  const temperature = parseFloat(document.getElementById(`temp-${side}`).value);
  const mctsChecked = document.getElementById(`mcts-${side}`).checked;
  const sims = parseInt(document.getElementById(`sims-${side}`).value) || 100;
  return { policy, temperature, mcts_simulations: mctsChecked ? sims : 0 };
}

// --- Neural options visibility ---
function onPolicyChange(side) {
  const val = document.getElementById(side).value;
  const isNeural = val.startsWith('checkpoint:');
  document.getElementById(`neural-opts-${side}`).style.display = isNeural ? '' : 'none';
  if (!isNeural) {
    document.getElementById(`mcts-${side}`).checked = false;
    document.getElementById(`mcts-sims-row-${side}`).style.display = 'none';
  }
  // Trigger mid-game AI if needed
  const player = side === 'black' ? 1 : 2;
  if (!game || game.winner !== null) return;
  if (game.currentPlayer === player && !isHuman(player)) aiTurnLoop();
}

function onMctsChange(side) {
  const checked = document.getElementById(`mcts-${side}`).checked;
  document.getElementById(`mcts-sims-row-${side}`).style.display = checked ? '' : 'none';
}

// --- Swap players ---
function swapPlayers() {
  const bSel = document.getElementById('black');
  const wSel = document.getElementById('white');
  const bTmp = bSel.value; bSel.value = wSel.value; wSel.value = bTmp;

  const sides = ['black', 'white'];
  const swapVal = (id) => {
    const [aEl, bEl] = sides.map(s => document.getElementById(id.replace('SIDE', s)));
    const tmp = aEl.value; aEl.value = bEl.value; bEl.value = tmp;
  };
  swapVal('temp-SIDE');
  swapVal('sims-SIDE');

  const bMcts = document.getElementById('mcts-black').checked;
  const wMcts = document.getElementById('mcts-white').checked;
  document.getElementById('mcts-black').checked = wMcts;
  document.getElementById('mcts-white').checked = bMcts;

  // Sync displayed values and visibility
  for (const s of sides) {
    const tempVal = document.getElementById(`temp-${s}`).value;
    document.getElementById(`temp-${s}-val`).textContent = parseFloat(tempVal).toFixed(2);
    onPolicyChange(s);
    onMctsChange(s);
  }
}

// --- Game Logic ---

function createBoard() {
  return Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
}

function getValidMoves(board) {
  const moves = [];
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (board[r][c] === 0) moves.push([r, c]);
  return moves;
}

function checkWin(board, row, col) {
  const player = board[row][col];
  if (player === 0) return false;
  const directions = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr, dc] of directions) {
    let count = 1;
    for (const sign of [1, -1]) {
      let r = row + dr * sign, c = col + dc * sign;
      while (r >= 0 && r < SIZE && c >= 0 && c < SIZE && board[r][c] === player) {
        count++;
        r += dr * sign;
        c += dc * sign;
      }
    }
    if (count >= WIN_LENGTH) return true;
  }
  return false;
}

function makeMove(row, col) {
  if (game.winner !== null) return false;
  if (row < 0 || row >= SIZE || col < 0 || col >= SIZE) return false;
  if (game.board[row][col] !== 0) return false;

  game.board[row][col] = game.currentPlayer;
  game.lastMove = [row, col];

  if (checkWin(game.board, row, col)) {
    game.winner = game.currentPlayer;
  } else if (getValidMoves(game.board).length === 0) {
    game.winner = 0;
  } else {
    game.currentPlayer = 3 - game.currentPlayer;
  }
  return true;
}

// --- AI Communication ---

async function requestAIMove(config) {
  const res = await fetch(`${API_BASE}/api/move`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      board: game.board,
      current_player: game.currentPlayer,
      ...config,
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: 'Network error' }));
    throw new Error(err.error || 'AI request failed');
  }
  return res.json();
}

async function aiTurnLoop() {
  if (aiLoopRunning) return;  // prevent multiple concurrent loops
  aiLoopRunning = true;

  while (game && game.winner === null) {
    if (isHuman(game.currentPlayer)) break;
    const config = getPlayerConfig(game.currentPlayer);  // re-read each iteration

    thinking = true;
    render();

    try {
      const { row, col } = await requestAIMove(config);
      // Re-check after await — user might have switched mid-request
      if (isHuman(game.currentPlayer)) {
        thinking = false;
        render();
        break;
      }
      if (!makeMove(row, col)) {
        console.error('AI returned invalid move', row, col);
        break;
      }
    } catch (e) {
      console.error('AI error:', e.message);
      break;
    }

    thinking = false;
    render();

    // Small delay between AI-vs-AI moves for visibility
    if (game.winner === null && !isHuman(game.currentPlayer)) {
      await new Promise(r => setTimeout(r, 200));
    }
  }

  thinking = false;
  aiLoopRunning = false;
  render();
}

// Dropdown change listeners are handled by onPolicyChange() via onchange= attributes

// --- Drawing ---

function drawBoard() {
  ctx.fillStyle = '#c8a45c';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 0.8;
  for (let i = 0; i < SIZE; i++) {
    const p = PADDING + i * cellSize;
    ctx.beginPath(); ctx.moveTo(p, PADDING); ctx.lineTo(p, canvas.height - PADDING); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(PADDING, p); ctx.lineTo(canvas.width - PADDING, p); ctx.stroke();
  }
  const stars = [3, 7, 11];
  ctx.fillStyle = '#333';
  for (const r of stars) for (const c of stars) {
    ctx.beginPath();
    ctx.arc(PADDING + c * cellSize, PADDING + r * cellSize, 3.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawStones() {
  if (!game) return;
  for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
    const v = game.board[r][c];
    if (v === 0) continue;
    const x = PADDING + c * cellSize, y = PADDING + r * cellSize;
    ctx.beginPath();
    ctx.arc(x, y, cellSize * 0.43, 0, Math.PI * 2);
    ctx.fillStyle = v === 1 ? '#111' : '#f5f5f5';
    ctx.fill();
    ctx.strokeStyle = v === 1 ? '#000' : '#bbb';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  if (game.lastMove) {
    const [r, c] = game.lastMove;
    const x = PADDING + c * cellSize, y = PADDING + r * cellSize;
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#e94560';
    ctx.fill();
  }
}

function updateStatus() {
  const el = document.getElementById('status');
  if (!game) { el.textContent = 'Click "New Game" to start'; el.classList.remove('thinking'); return; }
  if (game.winner === 1) { el.textContent = '⚫ Black wins!'; el.classList.remove('thinking'); }
  else if (game.winner === 2) { el.textContent = '⚪ White wins!'; el.classList.remove('thinking'); }
  else if (game.winner === 0) { el.textContent = 'Draw!'; el.classList.remove('thinking'); }
  else if (thinking) { el.textContent = (game.currentPlayer === 1 ? '⚫ Black' : '⚪ White') + ' is thinking...'; el.classList.add('thinking'); }
  else { el.textContent = (game.currentPlayer === 1 ? '⚫ Black' : '⚪ White') + "'s turn"; el.classList.remove('thinking'); }
}

function render() { drawBoard(); drawStones(); updateStatus(); }

// --- User Interaction ---

function newGame() {
  game = {
    board: createBoard(),
    currentPlayer: 1,
    winner: null,
    lastMove: null,
  };
  thinking = false;
  aiLoopRunning = false;
  render();
  // If first player is AI, start the AI loop
  if (!isHuman(1)) {
    aiTurnLoop();
  }
}

canvas.addEventListener('click', async (e) => {
  if (!game || game.winner !== null || thinking) return;
  if (!isHuman(game.currentPlayer)) return;

  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;
  const col = Math.round((x - PADDING) / cellSize);
  const row = Math.round((y - PADDING) / cellSize);
  if (row < 0 || row >= SIZE || col < 0 || col >= SIZE) return;

  if (!makeMove(row, col)) return;
  render();

  // After human move, let AI respond if next player is AI
  if (game.winner === null && !isHuman(game.currentPlayer)) {
    aiTurnLoop();
  }
});

render();

// --- Load checkpoints from server and populate dropdowns ---

async function loadCheckpoints() {
  try {
    const res = await fetch('/api/checkpoints');
    if (!res.ok) return;
    const { checkpoints } = await res.json();
    if (!checkpoints || checkpoints.length === 0) return;

    const selects = [document.getElementById('black'), document.getElementById('white')];
    for (const sel of selects) {
      // Add a visual separator
      const sep = document.createElement('option');
      sep.disabled = true;
      sep.textContent = '── Neural (trained) ──';
      sel.appendChild(sep);

      for (const name of checkpoints) {
        // name like "iter_0012.pt" → label "Neural iter 12"
        const iter = name.match(/iter_(\d+)/);
        const label = iter ? `Neural iter ${parseInt(iter[1], 10)}` : name;
        const opt = document.createElement('option');
        opt.value = `checkpoint:${name}`;
        opt.textContent = label;
        sel.appendChild(opt);
      }
    }
  } catch (e) {
    // Server may not support the endpoint (e.g. serverless) — silently skip
  }
}

loadCheckpoints();
</script>
</body>
</html>
