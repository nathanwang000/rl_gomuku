<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Board background -->
  <rect width="64" height="64" rx="8" fill="#dcb35c"/>
  <!-- Grid lines -->
  <g stroke="#8b6914" stroke-width="1.2">
    <line x1="12" y1="12" x2="12" y2="52"/>
    <line x1="22" y1="12" x2="22" y2="52"/>
    <line x1="32" y1="12" x2="32" y2="52"/>
    <line x1="42" y1="12" x2="42" y2="52"/>
    <line x1="52" y1="12" x2="52" y2="52"/>
    <line x1="12" y1="12" x2="52" y2="12"/>
    <line x1="12" y1="22" x2="52" y2="22"/>
    <line x1="12" y1="32" x2="52" y2="32"/>
    <line x1="12" y1="42" x2="52" y2="42"/>
    <line x1="12" y1="52" x2="52" y2="52"/>
  </g>
  <!-- Black stone -->
  <circle cx="22" cy="22" r="7" fill="#222">
    <title>Black</title>
  </circle>
  <circle cx="22" cy="22" r="5" fill="url(#blackGrad)"/>
  <!-- White stone -->
  <circle cx="42" cy="42" r="7" fill="#ddd">
    <title>White</title>
  </circle>
  <circle cx="42" cy="42" r="5" fill="url(#whiteGrad)"/>
  <!-- Gradients for 3D effect -->
  <defs>
    <radialGradient id="blackGrad" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#111"/>
    </radialGradient>
    <radialGradient id="whiteGrad" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#bbb"/>
    </radialGradient>
  </defs>
</svg>
