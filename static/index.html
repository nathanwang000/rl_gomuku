<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gomoku</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee;
       display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
h1 { margin-bottom: 10px; color: #e94560; }
#controls { margin-bottom: 15px; display: flex; gap: 10px; align-items: center; }
select, button { padding: 6px 12px; border-radius: 4px; border: none; font-size: 14px; cursor: pointer; }
button { background: #e94560; color: #fff; }
button:hover { background: #ff6b6b; }
select { background: #16213e; color: #eee; border: 1px solid #444; }
#status { margin-bottom: 10px; font-size: 16px; min-height: 24px; }
canvas { cursor: crosshair; border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
</style>
</head>
<body>
<h1>Gomoku</h1>
<div id="controls">
  <label>Black: <select id="black"><option value="human">Human</option><option value="random">Random AI</option></select></label>
  <label>White: <select id="white"><option value="human">Human</option><option value="random">Random AI</option></select></label>
  <button onclick="newGame()">New Game</button>
</div>
<div id="status">Click "New Game" to start</div>
<canvas id="board" width="620" height="620"></canvas>

<script>
const SIZE = 15;
const PADDING = 20;
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const cellSize = (canvas.width - 2 * PADDING) / (SIZE - 1);
let state = null;

function drawBoard() {
  // Background
  ctx.fillStyle = '#c8a45c';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  // Grid
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 0.8;
  for (let i = 0; i < SIZE; i++) {
    const p = PADDING + i * cellSize;
    ctx.beginPath(); ctx.moveTo(p, PADDING); ctx.lineTo(p, canvas.height - PADDING); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(PADDING, p); ctx.lineTo(canvas.width - PADDING, p); ctx.stroke();
  }
  // Star points
  const stars = [3, 7, 11];
  ctx.fillStyle = '#333';
  for (const r of stars) for (const c of stars) {
    ctx.beginPath();
    ctx.arc(PADDING + c * cellSize, PADDING + r * cellSize, 3.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawStones() {
  if (!state) return;
  for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
    const v = state.board[r][c];
    if (v === 0) continue;
    const x = PADDING + c * cellSize, y = PADDING + r * cellSize;
    ctx.beginPath();
    ctx.arc(x, y, cellSize * 0.43, 0, Math.PI * 2);
    ctx.fillStyle = v === 1 ? '#111' : '#f5f5f5';
    ctx.fill();
    ctx.strokeStyle = v === 1 ? '#000' : '#bbb';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  // Highlight last move
  if (state.last_move) {
    const [r, c] = state.last_move;
    const x = PADDING + c * cellSize, y = PADDING + r * cellSize;
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#e94560';
    ctx.fill();
  }
}

function updateStatus() {
  const el = document.getElementById('status');
  if (!state) { el.textContent = 'Click "New Game" to start'; return; }
  if (state.winner === 1) el.textContent = '⚫ Black wins!';
  else if (state.winner === 2) el.textContent = '⚪ White wins!';
  else if (state.winner === 0) el.textContent = 'Draw!';
  else el.textContent = (state.current_player === 1 ? '⚫ Black' : '⚪ White') + "'s turn";
}

function render() { drawBoard(); drawStones(); updateStatus(); }

async function newGame() {
  const black = document.getElementById('black').value;
  const white = document.getElementById('white').value;
  const res = await fetch('/api/new', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({black, white})
  });
  state = await res.json();
  render();
}

canvas.addEventListener('click', async (e) => {
  if (!state || state.winner !== null) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;
  const col = Math.round((x - PADDING) / cellSize);
  const row = Math.round((y - PADDING) / cellSize);
  if (row < 0 || row >= SIZE || col < 0 || col >= SIZE) return;
  const res = await fetch('/api/move', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({row, col})
  });
  const data = await res.json();
  if (data.error) return;
  state = data;
  render();
});

render();
</script>
</body>
</html>
